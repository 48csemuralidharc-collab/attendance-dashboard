<!DOCTYPE html>
<html>
<head>
  <title>RFID Attendance Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f9; }
    header {
      background: #2ecc71;
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 22px;
    }
    table {
      width: 95%;
      margin: 20px auto;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    th { background: #27ae60; color: white; padding: 12px; }
    td { padding: 10px; text-align: center; border-bottom: 1px solid #ddd; }
    tr:hover { background: #f1f1f1; }
    .status { text-align: center; margin-top: 10px; font-weight: bold; }
  </style>
</head>

<body>

<header>📡 Live Attendance Dashboard</header>
<div class="status">Loading...</div>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>UID</th>
      <th>Date</th>
      <th>Time</th>
    </tr>
  </thead>
  <tbody id="data"></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSKt0IF4MtdfPMeasJeQWhnmwHMlKXsQWcnh_2nfZo5AmJVwX4yO_3bfiXbH7pQjv5qXtaNZWTW_fgK/pub?output=csv";

async function loadData() {
  try {
    const res = await fetch(url);
    const text = await res.text();

    console.log(text); // 👈 DEBUG

    const rows = text.trim().split("\n");
    const table = document.getElementById("data");
    table.innerHTML = "";

    rows.slice(1).forEach(row => {
      const cols = row.split(",");

      if (cols.length >= 4) {
        table.innerHTML += `
          <tr>
            <td>${cols[0]}</td>
            <td>${cols[1]}</td>
            <td>${cols[2]}</td>
            <td>${cols[3]}</td>
          </tr>`;
      }
    });

    document.querySelector(".status").innerText = "✅ Live";

  } catch (err) {
    console.error(err);
    document.querySelector(".status").innerText = "❌ Error loading data";
  }
}

loadData();
setInterval(loadData, 5000);

</script>

</body>
</html>
